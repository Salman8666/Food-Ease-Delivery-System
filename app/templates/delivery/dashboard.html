{% extends "base.html" %}
{% block content %}
<div class="container mt-4" data-aos="fade-up">
    <div class="card food-card p-4 border-0 mb-4 bg-dark text-white">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h4 class="fw-bold mb-1">Fulfillment Driver Portal</h4>
                <p class="mb-0 text-muted">Status: <span class="text-success fw-bold">● Active & Online</span></p>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="dutySwitch" checked>
            </div>
        </div>
    </div>

    <h5 class="fw-bold mb-3">Assigned Transports</h5>
    <div class="card food-card p-4 border-0 mb-3">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h6 class="fw-bold text-primary mb-1">Pick up from: Le Bistro Classique</h6>
                <p class="text-muted small mb-0"><i class="fa-solid fa-location-dot me-1"></i> 742 Evergreen Terrace, Culinary District</p>
            </div>
            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                <a href="#" class="btn btn-premium btn-sm rounded-pill px-4">Begin Navigation</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
