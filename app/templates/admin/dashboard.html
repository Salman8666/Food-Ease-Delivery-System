{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row align-items-center mb-4" data-aos="fade-down">
        <div class="col">
            <h1 class="fw_bold_text_dark">Executive Platform Analytics</h1>
            <p class="text_muted">Real-time performance monitoring metrics</p>
        </div>
    </div>

    <div class="row mb-5">
        <div class="col-md-4 mb-3" data-aos="zoom-in" data-aos-delay="100">
            <div class="card food-card p-4 border-0">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase text-muted small fw-bold">Gross Platform Revenue</h6>
                        <h2 class="fw-black mb-0 font-monospace text-dark">$48,250.00</h2>
                    </div>
                    <div class="bg-light p-3 rounded-circle text-primary"><i class="fa-solid fa-wallet fa-2x"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3" data-aos="zoom-in" data-aos-delay="200">
            <div class="card food-card p-4 border-0">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase text-muted small fw-bold">Active Transacting Users</h6>
                        <h2 class="fw-black mb-0 font-monospace text-dark">12,480</h2>
                    </div>
                    <div class="bg-light p-3 rounded-circle text-success"><i class="fa-solid fa-users fa-2x"></i></div>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3" data-aos="zoom-in" data-aos-delay="300">
            <div class="card food-card p-4 border-0">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="text-uppercase text-muted small fw-bold">Fulfillment Capacity</h6>
                        <h2 class="fw-black mb-0 font-monospace text-dark">98.4%</h2>
                    </div>
                    <div class="bg-light p-3 rounded-circle text-warning"><i class="fa-solid fa-truck-fast fa-2x"></i></div>
                </div>
            </div>
        </div>
    </div>

    <div class="row" data-aos="slide-up">
        <div class="col-md-8 mb-4">
            <div class="card food-card p-4 border-0 h-100">
                <h5 class="fw-bold text-dark mb-4"><i class="fa-solid fa-chart-line text-primary me-2"></i> Revenue Aggregation Timeline</h5>
                <canvas id="revenueChart"></canvas>
            </div>
        </div>
        <div class="col-md-4 mb-4">
            <div class="card food-card p-4 border-0 h-100">
                <h5 class="fw-bold text-dark mb-4"><i class="fa-solid fa-pizza-slice text-primary me-2"></i> Category Allocation</h5>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // Linear Timeline Data
    const revCtx = document.getElementById('revenueChart').getContext('2d');
    new Chart(revCtx, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            datasets: [{
                label: 'Monthly Net Revenue ($)',
                data: [12000, 19000, 32000, 50000, 41000, 48250],
                borderColor: '#ff6b00',
                backgroundColor: 'rgba(255, 107, 0, 0.1)',
                fill: true,
                tension: 0.4
            }]
        }
    });

    // Radial Matrix Distribution Data
    const catCtx = document.getElementById('categoryChart').getContext('2d');
    new Chart(catCtx, {
        type: 'doughnut',
        data: {
            labels: ['Fast Food', 'Desserts', 'Healthy', 'Asian'],
            datasets: [{
                data: [45, 15, 25, 15],
                backgroundColor: ['#ff6b00', '#111111', '#28a745', '#ffc107']
            }]
        }
    });
});
</script>
{% endblock %}
